<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTales Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #f4f4f5; /* zinc-100 */
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        /* High-Definition Contrast Typography */
        .text-white { color: #ffffff !important; }
        .text-zinc-100 { color: #f4f4f5 !important; }
        .text-zinc-200 { color: #e4e4e7 !important; }
        .text-zinc-300 { color: #d4d4d8 !important; }
        .text-zinc-400 { color: #a1a1aa !important; } 
        .text-zinc-500 { color: #71717a !important; }
        .text-zinc-600 { color: #52525b !important; }
        
        .border-zinc-800 { border-color: #27272a !important; }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .cursor-blink {
            animation: blink 1s step-end infinite;
        }
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.03), transparent);
            animation: scanline 12s linear infinite;
            pointer-events: none;
            z-index: 100;
        }
        /* Speed Labs Lightning Animations */
        @keyframes strike {
            0% { stroke-dashoffset: 400; }
            40% { stroke-dashoffset: 0; }
            60% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -400; }
        }
        @keyframes strike-fill {
            0%, 30% { opacity: 0; }
            40%, 60% { opacity: 1; }
            70%, 100% { opacity: 0; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "pdf-lib": "https://esm.sh/pdf-lib@^1.17.1",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="scanline"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
